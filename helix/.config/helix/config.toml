theme = "ttokyonight"

[editor]
line-number = "relative"
mouse = true
middle-click-paste = true
auto-completion = false
path-completion = true
auto-pairs = false
continue-comments = false
default-yank-register = "+"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
